<!-- 导航栏 -->
<nav class="navbar fixed top-0 z-50 w-full" role="navigation" aria-label="主导航">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-14">
      <a href="#" class="flex items-center space-x-2 group" aria-label="回到首页">
        <div class="w-8 h-8 rounded-lg bg-[var(--accent)] flex items-center justify-center text-white text-sm font-semibold group-hover:bg-[var(--accent-hover)]">
          <i class="fa fa-book" aria-hidden="true"></i>
        </div>
        <span class="text-base font-semibold group-hover:text-[var(--accent)]">shayne</span>
      </a>
      <div class="flex items-center space-x-1 sm:space-x-2">
        <a href="https://github.com/shaynewq/shaynewq.github.io" class="p-2 text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] rounded-lg mr-2" aria-label="GitHub 仓库" title="GitHub 仓库">
          <i class="fa fa-github" aria-hidden="true"></i>
        </a>
        <div class="hidden sm:block relative">
          <label for="search-input" class="sr-only">搜索文章</label>
          <input type="search" id="search-input" placeholder="搜索文章..."
                 class="search-input w-40 md:w-56" aria-autocomplete="list">
          <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-sm text-[var(--text-muted)] pointer-events-none" aria-hidden="true"></i>
        </div>
        <button id="language-toggle" class="p-2 text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] rounded-lg" aria-label="切换语言" title="切换语言">
          <i class="fa fa-globe" aria-hidden="true"></i>
          <span id="current-language" class="ml-1 text-sm">中文</span>
        </button>
        <button id="theme-toggle" class="p-2 text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] rounded-lg" aria-label="切换主题" title="切换主题">
          <i class="fa fa-moon-o" id="theme-icon" aria-hidden="true"></i>
        </button>
        <button id="mobile-menu-button" class="sm:hidden p-2 text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] rounded-lg" aria-label="打开菜单" aria-expanded="false" aria-controls="mobile-menu">
          <i class="fa fa-bars" aria-hidden="true"></i>
        </button>
      </div>
    </div>
    <div id="mobile-menu" class="sm:hidden hidden pb-4">
      <div class="mb-3">
        <label for="mobile-search-input" class="sr-only">搜索文章</label>
        <input type="search" id="mobile-search-input" placeholder="搜索文章..." class="search-input w-full">
      </div>
      <div class="flex justify-between items-center px-2 mb-3">
        <button id="mobile-language-toggle" class="px-3 py-2 text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] rounded-lg" aria-label="切换语言">
          <i class="fa fa-globe" aria-hidden="true"></i>
          <span id="mobile-current-language" class="ml-1 text-sm">中文</span>
        </button>
        <button id="mobile-theme-toggle" class="px-3 py-2 text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] rounded-lg" aria-label="切换主题">
          <i class="fa fa-moon-o" id="mobile-theme-icon" aria-hidden="true"></i>
        </button>
      </div>
      <ul class="space-y-1 bg-[var(--bg-secondary)] rounded-lg p-2" role="menubar">
        <li><a href="https://github.com/shaynewq/shaynewq.github.io/blob/main/README.md" class="block py-2 px-3 hover:bg-[var(--bg-tertiary)] rounded-md" role="menuitem" target="_blank">README</a></li>
        <li><a href="#categories" class="block py-2 px-3 hover:bg-[var(--bg-tertiary)] rounded-md" role="menuitem" data-i18n="categories">知识分类</a></li>
        <li><a href="#articles" class="block py-2 px-3 hover:bg-[var(--bg-tertiary)] rounded-md" role="menuitem" data-i18n="articles">最新文章</a></li>
        <li><a href="#section-about" class="block py-2 px-3 hover:bg-[var(--bg-tertiary)] rounded-md" role="menuitem" data-i18n="about">关于</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- 搜索结果 -->
<div id="search-results" class="container mx-auto px-4 pt-16 pb-4 max-w-4xl hidden" role="region" aria-live="polite"></div>

<!-- 主内容 -->
<main id="main-content">
  <!-- Hero -->
  <section class="py-16 md:py-24 bg-gradient-to-b from-[var(--accent-light)/30 to-transparent">
    <div class="container mx-auto px-4 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[var(--accent)] text-white text-2xl mb-6 shadow-md" aria-hidden="true">
        <i class="fa fa-book"></i>
      </div>
      <h1 class="text-4xl md:text-5xl font-bold mb-4">shayne</h1>
      <p class="text-lg text-[var(--text-secondary)] mb-8 max-w-xl mx-auto">
        记录学习心得，分享技术经验，构建个人知识体系
      </p>
      <div class="flex flex-col sm:flex-row justify-center gap-3">
        <a href="#articles" class="btn-primary px-6 py-2.5 inline-flex items-center justify-center">
          浏览文章
        </a>
        <a href="#categories" class="btn-secondary px-6 py-2.5 inline-flex items-center justify-center">
          查看分类
        </a>
      </div>
    </div>
  </section>

  <!-- 分类 -->
  <section id="categories" class="py-12 md:py-16">
    <div class="container mx-auto px-4">
      <div class="text-center mb-10">
        <h2 class="text-2xl md:text-3xl font-bold mb-2" data-i18n="categories">知识分类</h2>
        <p class="text-[var(--text-secondary)]">按主题组织的知识内容，方便快速定位和学习</p>
      </div>
      {{categories}}
    </div>
  </section>

  <!-- 最新文章 -->
  <section id="articles" class="py-12 md:py-16 bg-[var(--bg-secondary)]">
    <div class="container mx-auto px-4">
      <div class="text-center mb-10">
        <h2 class="text-2xl md:text-3xl font-bold mb-2" data-i18n="articles">最新文章</h2>
        <p class="text-[var(--text-secondary)]">最新的技术文章和学习笔记</p>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
        {{articles}}
      </div>
    </div>
  </section>

  <!-- 关于 -->
  <section id="section-about" class="py-12 md:py-16">
    <div class="container mx-auto px-4 text-center">
      <div class="max-w-lg mx-auto">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-[var(--accent)] text-white text-xl mb-4" aria-hidden="true">
          <i class="fa fa-heart"></i>
        </div>
        <h2 class="text-2xl md:text-3xl font-bold mb-3" data-i18n="about">关于</h2>
        <p class="text-[var(--text-secondary)] mb-6">
          基于 GitHub Actions 自动构建的静态博客系统，专注于技术知识分享和个人成长记录。
        </p>
        <a href="https://github.com/shaynewq" class="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-[var(--bg-secondary)] border border-[var(--border)] hover:border-[var(--accent)] hover:text-[var(--accent)]">
          <i class="fa fa-github" aria-hidden="true"></i>
        </a>
      </div>
    </div>
  </section>
</main>

<!-- 文章详情 -->
<div id="article-detail" class="hidden min-h-screen"></div>

<!-- 页脚 -->
<footer class="py-8 border-t border-[var(--border)]">
  <div class="container mx-auto px-4 text-center text-sm text-[var(--text-secondary)]">
    <p>&copy; 2024 shayne</p>
  </div>
</footer>
