<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="个人知识库 - 记录学习心得，分享技术经验">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <style>
    :root {
      --bg-primary: #F9FAFB;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #F3F4F6;
      --text-primary: #111827;
      --text-secondary: #4B5563;
      --text-muted: #9CA3AF;
      --accent: #3B82F6;
      --accent-hover: #2563EB;
      --accent-light: #DBEAFE;
      --border: #E5E7EB;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .dark {
      --bg-primary: #0B101B;
      --bg-secondary: #151E2E;
      --bg-tertiary: #1E2D42;
      --text-primary: #F9FAFB;
      --text-secondary: #CBD5E1;
      --text-muted: #94A3B8;
      --accent: #60A5FA;
      --accent-hover: #3B82F6;
      --accent-light: rgba(59, 130, 246, 0.15);
      --border: #1E2D42;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* 重置 */
    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      line-height: 1.3;
      color: var(--text-primary);
    }

    h1 { font-size: 2.5rem; }
    h2 { font-size: 2rem; }
    h3 { font-size: 1.5rem; }
    h4 { font-size: 1.25rem; }

    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      h2 { font-size: 1.5rem; }
      h3 { font-size: 1.25rem; }
    }

    /* 卡片 */
    .card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
    }

    .card-hover {
      transition: all 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent);
    }

    /* 按钮 */
    .btn-primary {
      background-color: var(--accent);
      color: #FFFFFF;
      font-weight: 600;
      border-radius: 0.5rem;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: transparent;
      border: 2px solid var(--border);
      color: var(--text-primary);
      font-weight: 600;
      border-radius: 0.5rem;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      background-color: var(--accent-light);
    }

    /* 导航栏 */
    .navbar {
      background-color: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .dark .navbar {
      background-color: rgba(11, 16, 27, 0.95);
    }

    /* 搜索框 */
    .search-input {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.5rem 1rem 0.5rem 2.5rem;
      font-size: 0.875rem;
      transition: all 0.3s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    /* 文章内容 */
    .article-content {
      color: var(--text-primary);
    }

    .article-content h1 {
      font-size: 2rem;
      margin: 2rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border);
    }

    .article-content h2 {
      font-size: 1.5rem;
      margin: 1.75rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .article-content h3 {
      font-size: 1.25rem;
      margin: 1.5rem 0 0.75rem;
    }

    .article-content h4 {
      font-size: 1.125rem;
      margin: 1.25rem 0 0.5rem;
    }

    .article-content p {
      margin: 1rem 0;
    }

    .article-content ul, .article-content ol {
      margin: 1rem 0;
      padding-left: 1.5rem;
    }

    .article-content li {
      margin: 0.375rem 0;
    }

    .article-content blockquote {
      border-left: 4px solid var(--accent);
      padding: 1rem 1.25rem;
      margin: 1.5rem 0;
      background-color: var(--accent-light);
      border-radius: 0 0.5rem 0.5rem 0;
      font-style: italic;
    }

    .article-content a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.3s ease;
    }

    .article-content a:hover {
      color: var(--accent-hover);
    }

    .article-content code:not(pre code) {
      background-color: var(--accent-light);
      color: var(--accent);
      padding: 0.125rem 0.375rem;
      border-radius: 0.25rem;
      font-size: 0.875em;
      font-weight: 500;
    }

    .article-content pre {
      background-color: #1e1e1e;
      border-radius: 0.5rem;
      padding: 1rem;
      margin: 1.5rem 0;
      overflow-x: auto;
    }

    .article-content pre code {
      color: #d4d4d4;
      background: none;
      padding: 0;
      font-size: 0.875em;
    }

    .article-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }

    .article-content th, .article-content td {
      border: 1px solid var(--border);
      padding: 0.75rem;
      text-align: left;
    }

    .article-content th {
      background-color: var(--bg-tertiary);
      font-weight: 600;
    }

    /* 标签 */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      background-color: var(--accent-light);
      color: var(--accent);
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* 动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fadeIn {
      animation: fadeIn 0.3s ease forwards;
    }

    /* 滚动条 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* 分类图标 */
    .category-icon {
      width: 2.75rem;
      height: 2.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--accent-light);
      color: var(--accent);
      border-radius: 0.75rem;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    /* 返回顶部 */
    .back-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 3rem;
      height: 3rem;
      background-color: var(--accent);
      color: #FFFFFF;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transform: translateY(1rem);
      transition: all 0.3s ease;
      z-index: 50;
      box-shadow: var(--shadow-lg);
    }

    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .back-to-top:hover {
      background-color: var(--accent-hover);
      transform: translateY(-0.25rem);
    }

    /* 焦点可见性 */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* 通用过渡 */
    a, button, input, [tabindex]:not(div) {
      transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
    }

    /* 移动端优化 */
    @media (max-width: 640px) {
      .article-content h1 { font-size: 1.5rem; }
      .article-content h2 { font-size: 1.25rem; }
      .article-content h3 { font-size: 1.125rem; }
      .back-to-top {
        bottom: 1.25rem;
        right: 1.25rem;
        width: 2.5rem;
        height: 2.5rem;
      }
    }
  </style>
</head>
<body>
  {{content}}
  <button id="back-to-top" class="back-to-top" aria-label="返回顶部">
    <i class="fa fa-arrow-up" aria-hidden="true"></i>
  </button>
  <script>
    const state = {
      theme: localStorage.getItem('theme') || 'light',
      lang: localStorage.getItem('lang') || 'zh',
      articles: {{articles}},
      searchQuery: ''
    };

    const i18n = {
      zh: {
        search: '搜索文章...',
        categories: '知识分类',
        articles: '最新文章',
        about: '关于',
        home: '首页',
        readMore: '阅读更多',
        noResults: '没有找到相关文章',
        backToTop: '返回顶部',
        searchPlaceholder: '输入关键词搜索...',
        browse: '浏览文章'
      },
      en: {
        search: 'Search articles...',
        categories: 'Knowledge Categories',
        articles: 'Latest Articles',
        about: 'About',
        home: 'Home',
        readMore: 'Read More',
        noResults: 'No articles found',
        backToTop: 'Back to Top',
        searchPlaceholder: 'Type to search...',
        browse: 'Browse Articles'
      }
    };

    function t(key) {
      return i18n[state.lang][key] || key;
    }

    function toggleTheme() {
      state.theme = state.theme === 'light' ? 'dark' : 'light';
      document.documentElement.classList.toggle('dark', state.theme === 'dark');
      localStorage.setItem('theme', state.theme);
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const icon = document.getElementById('theme-icon');
      const mobileIcon = document.getElementById('mobile-theme-icon');
      const className = 'fa ' + (state.theme === 'light' ? 'fa-moon-o' : 'fa-sun-o');
      if (icon) icon.className = className;
      if (mobileIcon) mobileIcon.className = className;
    }

    function toggleLanguage() {
      state.lang = state.lang === 'zh' ? 'en' : 'zh';
      document.documentElement.lang = state.lang === 'zh' ? 'zh-CN' : 'en';
      localStorage.setItem('lang', state.lang);
      updateLanguageText();
      renderAll();
    }

    function updateLanguageText() {
      const langText = state.lang === 'zh' ? '中文' : 'EN';
      document.querySelectorAll('#current-language, #mobile-current-language').forEach(el => {
        el.textContent = langText;
      });
    }

    function searchArticles(query) {
      state.searchQuery = query;
      const lowerQuery = query.toLowerCase();
      const results = state.articles.filter(article => {
        const fields = [
          article.title[state.lang] || article.title.zh || '',
          article.description?.[state.lang] || article.description?.zh || '',
          article.tags?.join(' ') || '',
          article.category || '',
          article.subcategory || ''
        ];
        return fields.some(f => f.toLowerCase().includes(lowerQuery));
      });
      renderSearchResults(results);
    }

    function renderSearchResults(results) {
      const container = document.getElementById('search-results');
      if (!container) return;

      if (!state.searchQuery) {
        container.innerHTML = '';
        container.classList.add('hidden');
        return;
      }

      container.classList.remove('hidden');

      if (!results.length) {
        container.innerHTML = `
          <div class="text-center py-12 text-[var(--text-secondary)]">
            <i class="fa fa-search text-3xl mb-3" aria-hidden="true"></i>
            <p>${t('noResults')}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = results.map((a, i) => `
        <div class="search-result card card-hover p-4 mb-3 cursor-pointer animate-fadeIn"
             style="animation-delay: ${i * 50}ms"
             onclick="showArticle('${a.url}')">
          <h3 class="font-semibold mb-2 hover:text-[var(--accent)]">
            ${a.title[state.lang] || a.title.zh}
          </h3>
          <p class="text-sm text-[var(--text-secondary)] mb-2 line-clamp-2">
            ${a.description?.[state.lang] || a.description?.zh || a.excerpt}
          </p>
          <div class="flex items-center justify-between text-xs text-[var(--text-muted)]">
            <span class="tag">${a.category}/${a.subcategory}</span>
            <time>${a.date}</time>
          </div>
        </div>
      `).join('');
    }

    function showArticle(url) {
      const article = state.articles.find(a => a.url === url);
      if (article) window.location.href = url;
    }

    function renderAll() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.textContent = t(key);
      });
      document.querySelectorAll('#search-input, #mobile-search-input').forEach(input => {
        input.placeholder = t('searchPlaceholder');
      });
    }

    function handleBackToTop() {
      const btn = document.getElementById('back-to-top');
      if (!btn) return;

      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) btn.classList.add('visible');
        else btn.classList.remove('visible');
      });

      btn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (state.theme === 'dark') {
        document.documentElement.classList.add('dark');
      }
      updateThemeIcon();
      updateLanguageText();

      const themeToggle = document.getElementById('theme-toggle');
      const mobileThemeToggle = document.getElementById('mobile-theme-toggle');
      const langToggle = document.getElementById('language-toggle');
      const mobileLangToggle = document.getElementById('mobile-language-toggle');
      const searchInput = document.getElementById('search-input');
      const mobileSearchInput = document.getElementById('mobile-search-input');
      const mobileMenu = document.getElementById('mobile-menu');
      const mobileMenuBtn = document.getElementById('mobile-menu-button');

      if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
      if (mobileThemeToggle) mobileThemeToggle.addEventListener('click', toggleTheme);
      if (langToggle) langToggle.addEventListener('click', toggleLanguage);
      if (mobileLangToggle) mobileLangToggle.addEventListener('click', toggleLanguage);
      if (searchInput) {
        searchInput.addEventListener('input', (e) => searchArticles(e.target.value));
      }
      if (mobileSearchInput) {
        mobileSearchInput.addEventListener('input', (e) => searchArticles(e.target.value));
      }
      if (mobileMenuBtn && mobileMenu) {
        mobileMenuBtn.addEventListener('click', () => {
          mobileMenu.classList.toggle('hidden');
        });
      }

      renderAll();
      handleBackToTop();

      window.addEventListener('hashchange', handleHashChange);
      handleHashChange();
    });

    function handleHashChange() {
      const hash = window.location.hash;
      if (hash && hash.startsWith('#') && !['#categories', '#articles', '#about'].includes(hash)) {
        const [category, subcategory, slug] = hash.substring(1).split('/');
        showArticleDetail(category, subcategory, slug);
      } else {
        backButtonToMain();
      }
    }

    function showArticleDetail(category, subcategory, slug) {
      const url = `#${category}/${subcategory}/${slug}`;
      const article = state.articles.find(a => a.url === url);
      if (!article) return;

      const detailContainer = document.getElementById('article-detail');
      const mainContent = document.getElementById('main-content');
      const navbar = document.querySelector('.navbar');

      if (detailContainer && mainContent) {
        mainContent.classList.add('hidden');
        navbar.classList.add('hidden');
        detailContainer.classList.remove('hidden');
        detailContainer.innerHTML = `
          <div class="container mx-auto px-4 py-8 max-w-4xl">
            <button onclick="backButtonToMain()" class="mb-6 text-[var(--accent)] hover:text-[var(--accent-hover)] font-medium inline-flex items-center">
              <i class="fa fa-arrow-left mr-2" aria-hidden="true"></i>
              ${t('home')}
            </button>
            <article class="article-content">
              <h1>${article.title[state.lang] || article.title.zh}</h1>
              <div class="flex flex-wrap items-center gap-4 text-sm text-[var(--text-secondary)] mb-8 py-4 border-b border-[var(--border)]">
                <time datetime="${article.date}">${article.date}</time>
                <span class="tag">${article.category}/${article.subcategory}</span>
                ${article.author ? `<span>${article.author}</span>` : ''}
              </div>
              ${article.html}
            </article>
            <footer class="mt-16 pt-8 border-t border-[var(--border)] text-center text-[var(--text-secondary)]">
              <p>&copy; ${new Date().getFullYear()} 个人知识库</p>
            </footer>
          </div>
        `;
        window.scrollTo(0, 0);
      }
    }

    function backButtonToMain() {
      const detailContainer = document.getElementById('article-detail');
      const mainContent = document.getElementById('main-content');
      const navbar = document.querySelector('.navbar');
      if (detailContainer) detailContainer.classList.add('hidden');
      if (mainContent) mainContent.classList.remove('hidden');
      if (navbar) navbar.classList.remove('hidden');
    }
  </script>
</body>
</html>
